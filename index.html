<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Content Pipeline</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="logo">&#9654; YT Pipeline</span>
      <nav>
        <button class="tab-btn active" data-tab="topics">1. Trending Topics</button>
        <button class="tab-btn" data-tab="script">2. Script Generator</button>
        <button class="tab-btn" data-tab="video">3. Generate Video</button>
        <button class="tab-btn" data-tab="upload">4. Upload to YouTube</button>
        <button class="tab-btn" data-tab="distribute">5. Distribute</button>
        <button class="tab-btn" data-tab="history">6. History</button>
        <button class="tab-btn settings-tab-btn" data-tab="settings">
          ⚙ Settings
          <span class="nav-dot" id="settings-dot"></span>
        </button>
        <button id="usage-widget-btn" class="usage-widget-btn usage-green"
          title="Click to see API cost breakdown">
          💰 $0.00 today
        </button>
      </nav>
    </div>
  </header>

  <main>
    <div id="tab-topics"   class="tab-panel active"></div>
    <div id="tab-script"   class="tab-panel"></div>
    <div id="tab-video"    class="tab-panel"></div>
    <div id="tab-upload"     class="tab-panel"></div>
    <div id="tab-distribute" class="tab-panel"></div>
    <div id="tab-history"    class="tab-panel"></div>
    <div id="tab-settings" class="tab-panel"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
