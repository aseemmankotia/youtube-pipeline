name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Check required files
        run: bash scripts/pre-deploy-check.sh
        env:
          # Skip test re-run inside pre-deploy since we already ran above.
          # (pre-deploy-check.sh calls npm test; set a sentinel to skip it)
          SKIP_TESTS: 'true'
